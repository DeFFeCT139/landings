<!DOCTYPE html>
<html lang="ru" id="html" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANDINGS</title>
    <link rel="stylesheet" href="./css/font.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
              <a class="navbar-brand">LANDINGS</a>
              <button  type="button" onclick="thems()" class="btn btn-sun btn-outline-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-sun" viewBox="0 0 16 16">
                    <path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6m0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
                </svg>
              </button>
            </div>
          </nav>
    </header>
    <main>
        <div class="container">
            <h1 class="mb-4 mt-3">Список моих работ</h1>
            <select onchange="getItemList(this)" id="select" class="form-select mb-4 mt-3" aria-label="Default select example">
                <option selected>Все</option>
                <option>Site</option>
                <option>App</option>
            </select>
            <div id="linkList" class="link-list grid mb-5">
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script>
        let list = [
            {id:1, type: 'Site', name: 'Сайт 7ya', img: './img/Opera Снимок_2024-05-06_190346_7ya.ee.png', link: 'https://7ya.ee/', linkCode: 'https://github.com/DeFFeCT139/7ya'},
            {id:2, type: 'Site', name: 'Сайт МТК TehnoSoft', img: './img/Opera Снимок_2024-05-06_190751_deffect139.github.io.png', link: 'https://deffect139.github.io/tehno1/', linkCode: 'https://github.com/DeFFeCT139/tehno1'},
            {id:3, type: 'Site', name: 'Сайт Alivia Hotel', img: './img/Opera Снимок_2024-05-06_190836_aliviahotel.com.png', link: 'https://aliviahotel.com/', linkCode: 'https://github.com/DeFFeCT139/alivia'},
            {id:4, type: 'Site', name: 'Сайт WETOP', img: './img/Opera Снимок_2024-05-06_192757_wetop.ru.png', link: 'https://wetop.ru/', linkCode: ''},
            {id:5, type: 'Site', name: 'Сайт SEMITEX', img: './img/Opera Снимок_2024-05-07_183626_127.0.0.1.png', link: 'https://deffect139.github.io/landings/sites/simitex/', linkCode: 'https://github.com/DeFFeCT139/landings/tree/master/sites/simitex'},
            {id:6, type: 'Site', name: 'Сайт Правильная Пастила', img: './img/Opera Снимок_2024-05-07_184457_deffect139.github.io.png', link: 'https://deffect139.github.io/pastel', linkCode: 'https://github.com/DeFFeCT139/pastel'},
            {id:7, type: 'App', name: 'App автопечать', img: './img/GettyImages-908200362.webp', link: '', linkCode: 'https://github.com/DeFFeCT139/aytokey'},
            {id:8, type: 'Site', name: 'Dashbord', img: './img/GettyImages-908200362.webp', link: 'https://master--porfolitiredfox.netlify.app/', linkCode: 'https://github.com/DeFFeCT139/portfolio'},
        ]

        const getItemList = (select) => {
            let item = document.getElementById('linkList')
            if (select === undefined) select = 'Все' 
            let lists = list.filter(item => item.type === select.value)
            if (lists.length === 0) lists = list
            const html = lists.map((item) => `
                <div class="card bg-body-tertiary g-col-12 g-col-xl-3 g-col-lg-4 g-col-md-6 g-col-sm-12">
                    <div style="background-image: url('${item.img}')" class="card-img-top card-img-tops"></div>
                    <div class="card-body">
                      <h5 class="card-title">${item.name}</h5>
                      <div class="grid">
                        <a href="${item.link}" ${item.link === ''? 'aria-disabled="true"': ''} style="width: 100%;" class="${item.link === ''? 'disabled': ''} g-col-md-6 btn btn-secondary">Сайт</a>
                        <a href="${item.linkCode}" ${item.linkCode === ''? 'aria-disabled="true"': ''} style="width: 100%;" class="${item.linkCode === ''? 'disabled': ''} g-col-md-6 btn btn-secondary">Код</a>
                      </div>
                    </div>
                </div>
            `).join('');
            item.innerHTML = html;
        }
        getItemList()

        const thems = () => {
            if (document.documentElement.getAttribute('data-bs-theme') == 'dark') {
                document.documentElement.setAttribute('data-bs-theme','light')
            }
            else {
                document.documentElement.setAttribute('data-bs-theme','dark')
            }
        }
    </script>
</body>
</html>
